{{ define "main" }}
<h1>All {{ .Type }}</h1>

<ul class="terms terms-{{ .Type }}">
    {{ range $key, $value := .Data.Terms.ByCount }}
    <li>
        <a href="{{ $value.Name | urlize }}/">{{ $value.Name }}</a>
        &middot; {{ $value.Count | lang.FormatNumber 0 }}
    </li>
    {{ end }}
</ul>
{{ end }}
