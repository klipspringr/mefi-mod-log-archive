{{ define "main" }}

{{- $pag := .Paginate .Data.Pages }}

<div class="list-title">
    <h1>
        {{ if isset .Data "Term" }}
        Tagged "{{ .Data.Term }}"
        {{ else }}
        All pages
        {{ end }}
    </h1>
    {{ partial "page_counter.html" $pag }}
</div>

{{- range $pag.Pages -}}
{{ partial "item.html" . }}
{{- end -}}

{{- partial "pagination.html" . }}
{{ end }}
