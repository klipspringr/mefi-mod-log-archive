name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - "main" # deploy from main
    paths-ignore:
      - "check/**" # ignore pushes that only touch check/

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
      HUGO_VERSION: 0.161.1
      PAGEFIND_VERSION: 1.5.2
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6
        id: pages

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v6
        with:
          path: |
            /usr/local/bin/hugo
            ${{ env.HUGO_CACHEDIR }}
            /usr/local/bin/pagefind
          key: hugo-${{ env.HUGO_VERSION }}-hugomod-${{ hashFiles('**/go.sum') }}-pagefind-${{ env.PAGEFIND_VERSION }}

      - name: Install Hugo
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -sSLf "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz" \
          | sudo tar -C /usr/local/bin -xzf - hugo

      - name: Install Pagefind
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -sSLf https://github.com/Pagefind/pagefind/releases/download/v${{ env.PAGEFIND_VERSION }}/pagefind-v${{ env.PAGEFIND_VERSION }}-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz -C /usr/local/bin

      - name: Build with Hugo
        working-directory: blog
        run: |
          hugo mod verify
          mkdir -p assets/data
          hugo list published > assets/data/published-content.csv
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build Pagefind index
        working-directory: blog
        run: pagefind --site public --glob "posts/**/*.html"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: blog/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
