name: Deploy to GitHub Pages

on:
  push:
    branches:
      - "main" # deploy from main
    paths-ignore:
      - "check/**" # ignore pushes that only touch check/

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
      PAGEFIND_VERSION: v1.5.2
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6
        id: pages

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.3"

      - name: Cache Hugo modules
        uses: actions/cache@v5
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Cache Pagefind
        id: cache-pagefind
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/pagefind
          key: ${{ runner.os }}-pagefind-${{ env.PAGEFIND_VERSION }}

      - name: Install Pagefind
        if: steps.cache-pagefind.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://github.com/Pagefind/pagefind/releases/download/${{ env.PAGEFIND_VERSION }}/pagefind-${{ env.PAGEFIND_VERSION }}-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz -C /usr/local/bin

      - name: Build with Hugo
        working-directory: blog
        run: |
          hugo mod verify
          mkdir -p assets/data
          hugo list published > assets/data/published-content.csv
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build Pagefind index
        working-directory: blog
        run: pagefind --site public --glob "posts/**/*.html"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
